<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Responsabilidad Civil</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
  <div class="topbar">
    <h1>⚖️ Responsabilidad Civil</h1>
    <div class="sub">Extracontractual, Contractual y Profesional</div>
    <div class="nav-ramas">
      <a href="/">Seguro de auto</a>
      <a href="/caucion">Caución comercio</a>
      <a href="/incendio">Incendio</a>
      <a href="/naval">Casco / Náutica / Aéreo</a>
      <a href="/rc" class="activo">RC</a>
      <a href="/robo">Robo</a>
    </div>
  </div>

  <div class="wrap">
    <form class="card" action="/cotizar-rc" method="POST">
      <span class="km-label">COBERTURA</span>
      <label for="cobertura_rc">Elegí el tipo de Responsabilidad Civil</label>
      <select id="cobertura_rc" name="cobertura_rc" required>
        {% for grupo, items in coberturas_lista | groupby('grupo') %}
        <optgroup label="RC {{ grupo }}">
          {% for c in items %}
          <option value="{{ c.id }}">{{ c.nombre }}</option>
          {% endfor %}
        </optgroup>
        {% endfor %}
      </select>
      <div class="hint" id="nota-cobertura"></div>

      <label for="suma_asegurada">Suma asegurada / límite de responsabilidad (ARS)</label>
      <input type="number" id="suma_asegurada" name="suma_asegurada" min="0" step="1000" placeholder="ej: 50000000" required>

      <label class="checkbox-row" style="display:flex; align-items:center; gap:8px; font-weight:500; margin:14px 0;">
        <input type="checkbox" name="incluir_costas" checked style="width:auto;">
        Incluir gastos y costas judiciales/extrajudiciales (Art. 110 Ley 17.418)
      </label>

      <button class="cta" type="submit">Ver cotización →</button>
    </form>
  </div>

  <script>
    // Datos con las notas de cada cobertura, para mostrar debajo del select
    const notas = {
      {% for id, c in coberturas.items() %}
        "{{ id }}": "{{ c.nota }}",
      {% endfor %}
    };
    const select = document.getElementById('cobertura_rc');
    const notaDiv = document.getElementById('nota-cobertura');
    function actualizarNota() {
      notaDiv.textContent = notas[select.value] || "";
    }
    select.addEventListener('change', actualizarNota);
    actualizarNota();
  </script>
</body>
</html>
